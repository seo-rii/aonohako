name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/check_repo_policy.sh
      - run: ./scripts/check_repo_policy.sh

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: ./scripts/build_runtime_images.sh -mode production -dry-run -tag-prefix local/aonohako

  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: >
          go test ./internal/execute -count=1 -run
          'TestRunBlocksNetworkWhenDisabled|TestRunBlocksNetworkOnCloudRunWithoutDirectModeFallback|TestRunCannotReadHostPathOutsideSandbox|TestRunExposesOnlySafeDevices|TestRunBlocksForkAttempts|TestRunBlocksProcFDBrowsingOutsideSandbox'

  runtime-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - id: matrix
        run: |
          matrix=$(go run ./cmd/runtime-matrix -mode ci | jq -c '[.[] | {name: .Name}]')
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  language-smoke:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - sandbox
      - runtime-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.runtime-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - run: chmod +x scripts/build_runtime_images.sh scripts/smoke_runtime.sh
      - run: ./scripts/build_runtime_images.sh -mode ci -only "${{ matrix.name }}" -tag-prefix "aonohako-ci"
      - run: docker run --rm "aonohako-ci:${{ matrix.name }}" aonohako-smoke

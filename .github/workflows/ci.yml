name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOCACHE: ${{ github.workspace }}/.cache/go-build
  GOMODCACHE: ${{ github.workspace }}/.cache/go-mod

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: chmod +x scripts/check_repo_policy.sh
      - run: ./scripts/check_repo_policy.sh

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: ./scripts/build_runtime_images.sh -mode production -dry-run -tag-prefix local/aonohako

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  image-sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v4
      - run: chmod +x scripts/build_runtime_images.sh scripts/install_anchore_tool.sh
      - run: ./scripts/build_runtime_images.sh -mode ci -only ci-python -tag-prefix "aonohako-sbom"
      - run: |
          scripts/install_anchore_tool.sh syft v1.42.4 "${RUNNER_TEMP}/anchore-bin"
          "${RUNNER_TEMP}/anchore-bin/syft" "aonohako-sbom:ci-python" -o spdx-json=sbom-ci-python.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-ci-python
          path: sbom-ci-python.spdx.json
      - run: |
          scripts/install_anchore_tool.sh grype v0.111.0 "${RUNNER_TEMP}/anchore-bin"
          if ! "${RUNNER_TEMP}/anchore-bin/grype" "aonohako-sbom:ci-python" -o json > grype-ci-python.json; then
            printf '{"error":"grype scan failed"}\n' > grype-ci-python.json
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: grype-ci-python
          path: grype-ci-python.json

  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v4
      - run: chmod +x scripts/build_runtime_images.sh
      - run: ./scripts/build_runtime_images.sh -mode ci -only ci-python -tag-prefix "aonohako-ci-sandbox"
      - run: >
          docker run --rm
          -e AONOHAKO_EXECUTION_MODE=local-root
          -e AONOHAKO_ENFORCE_SANDBOX_TESTS=1
          -v "$PWD":/workspace
          -w /workspace
          "aonohako-ci-sandbox:ci-python"
          bash -c 'mkdir -p /work && chmod 0755 /work && export AONOHAKO_WORK_ROOT=/work && /usr/local/go/bin/go test -c ./internal/execute -o /work/execute.test && chmod 0755 /work/execute.test && /work/execute.test -test.count=1 -test.run "TestSandboxSecurityRegressionSuite" && /usr/local/go/bin/go test -c ./internal/compile -o /work/compile.test && chmod 0755 /work/compile.test && /work/compile.test -test.count=1 -test.run "TestCompileSandboxSecurityRegressionSuite" && aonohako-selftest compile-security'

  runtime-matrix:
    runs-on: ubuntu-latest
    outputs:
      ci_matrix: ${{ steps.matrix.outputs.ci_matrix }}
      production_matrix: ${{ steps.matrix.outputs.production_matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - id: matrix
        run: |
          ci_matrix=$(go run ./cmd/runtime-matrix -mode ci | jq -c '[.[] | {name: .Name}]')
          production_matrix=$(go run ./cmd/runtime-matrix -mode production | jq -c '[.[] | {name: .Name, languages: (.Languages | join(","))}]')
          echo "ci_matrix=${ci_matrix}" >> "${GITHUB_OUTPUT}"
          echo "production_matrix=${production_matrix}" >> "${GITHUB_OUTPUT}"

  language-smoke:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - supply-chain
      - sandbox
      - runtime-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.runtime-matrix.outputs.ci_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v4
      - run: chmod +x scripts/build_runtime_images.sh scripts/smoke_runtime.sh
      - run: ./scripts/build_runtime_images.sh -mode ci -only "${{ matrix.name }}" -tag-prefix "aonohako-ci"
      - run: docker run --rm "aonohako-ci:${{ matrix.name }}" aonohako-smoke

  toolchain-profile:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - supply-chain
      - sandbox
      - runtime-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.runtime-matrix.outputs.production_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v4
      - run: chmod +x scripts/build_runtime_images.sh scripts/report_toolchain_versions.sh scripts/install_anchore_tool.sh
      - run: mkdir -p "toolchain-artifacts/${{ matrix.name }}"
      - run: ./scripts/build_runtime_images.sh -mode production -only "${{ matrix.name }}" -tag-prefix "aonohako-ci-prod"
      - run: |
          scripts/install_anchore_tool.sh syft v1.42.4 "${RUNNER_TEMP}/anchore-bin"
          "${RUNNER_TEMP}/anchore-bin/syft" "aonohako-ci-prod:${{ matrix.name }}" -o spdx-json="toolchain-artifacts/${{ matrix.name }}/${{ matrix.name }}.sbom.spdx.json"
      - run: |
          scripts/install_anchore_tool.sh grype v0.111.0 "${RUNNER_TEMP}/anchore-bin"
          if ! "${RUNNER_TEMP}/anchore-bin/grype" "aonohako-ci-prod:${{ matrix.name }}" -o json > "toolchain-artifacts/${{ matrix.name }}/${{ matrix.name }}.grype.json"; then
            printf '{"error":"grype scan failed"}\n' > "toolchain-artifacts/${{ matrix.name }}/${{ matrix.name }}.grype.json"
          fi
      - run: >
          AONOHAKO_LANGUAGES="${{ matrix.languages }}"
          bash ./scripts/report_toolchain_versions.sh "aonohako-ci-prod:${{ matrix.name }}"
          > "toolchain-artifacts/${{ matrix.name }}/summary.md"
      - run: >
          docker save "aonohako-ci-prod:${{ matrix.name }}"
          | gzip -1
          > "toolchain-artifacts/${{ matrix.name }}/${{ matrix.name }}.docker.tar.gz"
      - run: >
          sha256sum "toolchain-artifacts/${{ matrix.name }}/${{ matrix.name }}.docker.tar.gz"
          > "toolchain-artifacts/${{ matrix.name }}/${{ matrix.name }}.docker.tar.gz.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: toolchain-profile-${{ matrix.name }}
          path: toolchain-artifacts/${{ matrix.name }}
          compression-level: 0

  toolchain-summary:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - supply-chain
      - sandbox
      - toolchain-profile
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: toolchain-profile-*
          path: toolchain-artifacts
          merge-multiple: false
      - id: bundle
        run: |
          shopt -s nullglob
          dirs=(toolchain-artifacts/toolchain-profile-*)
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo "No toolchain profile artifacts were produced." >> "$GITHUB_STEP_SUMMARY"
            echo "has_artifacts=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "has_artifacts=true" >> "${GITHUB_OUTPUT}"
      - run: |
          summary="$(python3 scripts/aggregate_toolchain_summaries.py toolchain-artifacts)"
          printf '%s\n' "${summary}" | tee toolchain-artifacts/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
        if: steps.bundle.outputs.has_artifacts == 'true'
      - run: |
          find toolchain-artifacts -type f | sort > toolchain-artifacts/MANIFEST.txt
        if: steps.bundle.outputs.has_artifacts == 'true'
      - run: |
          find toolchain-artifacts -type f -name '*.docker.tar.gz' -print0 | sort -z | xargs -0 -r sha256sum > toolchain-artifacts/SHA256SUMS
        if: steps.bundle.outputs.has_artifacts == 'true'
      - uses: actions/upload-artifact@v7
        if: steps.bundle.outputs.has_artifacts == 'true'
        with:
          name: toolchain-summary-bundle
          path: |
            toolchain-artifacts/SUMMARY.md
            toolchain-artifacts/MANIFEST.txt
            toolchain-artifacts/SHA256SUMS
            toolchain-artifacts/toolchain-profile-*/**/summary.md
            toolchain-artifacts/toolchain-profile-*/**/*.docker.tar.gz.sha256
          compression-level: 0

  mixin-smoke:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - supply-chain
      - sandbox
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v4
      - run: chmod +x scripts/build_runtime_images.sh
      - run: ./scripts/build_runtime_images.sh -mode production -only type-i -tag-prefix "aonohako-ci-mix"
      - run: docker run --rm "aonohako-ci-mix:type-i" aonohako-smoke

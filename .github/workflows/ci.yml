name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/check_repo_policy.sh
      - run: ./scripts/check_repo_policy.sh

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: ./scripts/build_runtime_images.sh -mode production -dry-run -tag-prefix local/aonohako

  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - run: chmod +x scripts/build_runtime_images.sh
      - run: ./scripts/build_runtime_images.sh -mode ci -only ci-python -tag-prefix "aonohako-ci-sandbox"
      - run: >
          docker run --rm
          -e AONOHAKO_EXECUTION_MODE=local-root
          -e AONOHAKO_ENFORCE_SANDBOX_TESTS=1
          -v "$PWD":/workspace
          -w /workspace
          "aonohako-ci-sandbox:ci-python"
          bash -c 'mkdir -p /work && export AONOHAKO_WORK_ROOT=/work && /usr/local/go/bin/go test -c ./internal/execute -o /work/execute.test && chmod 0755 /work/execute.test && /work/execute.test -test.count=1 -test.run "TestRunBlocksNetworkWhenDisabled|TestRunBlocksNetworkOnCloudRunWithoutDirectModeFallback|TestRunCannotReadHostPathOutsideSandbox|TestRunExposesOnlySafeDevices|TestRunBlocksForkAttempts|TestRunBlocksProcFDBrowsingOutsideSandbox|TestRunBlocksSocketPairCreationWhenNetworkDisabled|TestRunBlocksNamespaceEscapeAttempts"'

  runtime-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - id: matrix
        run: |
          matrix=$(go run ./cmd/runtime-matrix -mode ci | jq -c '[.[] | {name: .Name}]')
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  language-smoke:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - sandbox
      - runtime-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.runtime-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - run: chmod +x scripts/build_runtime_images.sh scripts/smoke_runtime.sh
      - run: ./scripts/build_runtime_images.sh -mode ci -only "${{ matrix.name }}" -tag-prefix "aonohako-ci"
      - run: docker run --rm "aonohako-ci:${{ matrix.name }}" aonohako-smoke

  toolchain-summary:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - run: chmod +x scripts/build_runtime_images.sh scripts/report_toolchain_versions.sh
      - run: |
          while IFS=$'\t' read -r name languages; do
            ./scripts/build_runtime_images.sh -mode production -only "${name}" -tag-prefix "aonohako-ci-prod"
            AONOHAKO_LANGUAGES="${languages}" bash ./scripts/report_toolchain_versions.sh "aonohako-ci-prod:${name}" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
          done < <(go run ./cmd/runtime-matrix -mode production | jq -r '.[] | [.Name, (.Languages | join(","))] | @tsv')

  mixin-smoke:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - run: chmod +x scripts/build_runtime_images.sh
      - run: ./scripts/build_runtime_images.sh -mode production -only type-i -tag-prefix "aonohako-ci-mix"
      - run: >
          docker run --rm "aonohako-ci-mix:type-i" bash -lc
          "printf '%s\n' '#include <stdio.h>' 'int main(void) { puts(\"ok\"); return 0; }' > Main.c &&
          gcc -O2 -pipe Main.c -o Main &&
          [ \"\$(./Main)\" = ok ]"
      - run: >
          docker run --rm "aonohako-ci-mix:type-i" python3 -c
          "from pathlib import Path; import numpy as np; Path('same-folder.txt').write_text(str(int(np.arange(5).sum())), encoding='utf-8'); assert Path('same-folder.txt').read_text(encoding='utf-8') == '10'; print('ok')"
      - run: >
          docker run --rm "aonohako-ci-mix:type-i" bash -lc
          "printf '%s\n' 'public class Main {' '  public static void main(String[] args) {' '    System.out.println(\"ok\");' '  }' '}' > Main.java &&
          javac --release 11 Main.java &&
          java Main | grep '^ok$'"

name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/check_repo_policy.sh
      - run: ./scripts/check_repo_policy.sh

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: ./scripts/build_runtime_images.sh -mode production -dry-run -tag-prefix local/aonohako

  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - run: chmod +x scripts/build_runtime_images.sh
      - run: ./scripts/build_runtime_images.sh -mode ci -only ci-python -tag-prefix "aonohako-ci-sandbox"
      - run: >
          docker run --rm
          -e AONOHAKO_EXECUTION_MODE=local-root
          -e AONOHAKO_ENFORCE_SANDBOX_TESTS=1
          -v "$PWD":/workspace
          -w /workspace
          "aonohako-ci-sandbox:ci-python"
          bash -c 'mkdir -p /work && export AONOHAKO_WORK_ROOT=/work && /usr/local/go/bin/go test -c ./internal/execute -o /work/execute.test && chmod 0755 /work/execute.test && /work/execute.test -test.count=1 -test.run "TestRunBlocksNetworkWhenDisabled|TestRunBlocksNetworkOnCloudRunWithoutDirectModeFallback|TestRunCannotReadHostPathOutsideSandbox|TestRunExposesOnlySafeDevices|TestRunBlocksForkAttempts|TestRunBlocksProcFDBrowsingOutsideSandbox|TestRunBlocksSocketPairCreationWhenNetworkDisabled|TestRunBlocksNamespaceEscapeAttempts|TestMaterializeFilesKeepsNestedPathsReadableAndWritableToSandboxUser|TestMaterializeFilesBuildsReadableSubmissionJarForSandboxUser"'

  runtime-matrix:
    runs-on: ubuntu-latest
    outputs:
      ci_matrix: ${{ steps.matrix.outputs.ci_matrix }}
      production_matrix: ${{ steps.matrix.outputs.production_matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - id: matrix
        run: |
          ci_matrix=$(go run ./cmd/runtime-matrix -mode ci | jq -c '[.[] | {name: .Name}]')
          production_matrix=$(go run ./cmd/runtime-matrix -mode production | jq -c '[.[] | {name: .Name, languages: (.Languages | join(","))}]')
          echo "ci_matrix=${ci_matrix}" >> "${GITHUB_OUTPUT}"
          echo "production_matrix=${production_matrix}" >> "${GITHUB_OUTPUT}"

  language-smoke:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - sandbox
      - runtime-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.runtime-matrix.outputs.ci_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - run: chmod +x scripts/build_runtime_images.sh scripts/smoke_runtime.sh
      - run: ./scripts/build_runtime_images.sh -mode ci -only "${{ matrix.name }}" -tag-prefix "aonohako-ci"
      - run: docker run --rm "aonohako-ci:${{ matrix.name }}" aonohako-smoke

  toolchain-profile:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - sandbox
      - runtime-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.runtime-matrix.outputs.production_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - run: chmod +x scripts/build_runtime_images.sh scripts/report_toolchain_versions.sh
      - run: mkdir -p "toolchain-artifacts/${{ matrix.name }}"
      - run: ./scripts/build_runtime_images.sh -mode production -only "${{ matrix.name }}" -tag-prefix "aonohako-ci-prod"
      - run: >
          AONOHAKO_LANGUAGES="${{ matrix.languages }}"
          bash ./scripts/report_toolchain_versions.sh "aonohako-ci-prod:${{ matrix.name }}"
          > "toolchain-artifacts/${{ matrix.name }}/summary.md"
      - run: >
          docker save "aonohako-ci-prod:${{ matrix.name }}"
          | gzip -1
          > "toolchain-artifacts/${{ matrix.name }}/${{ matrix.name }}.docker.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: toolchain-profile-${{ matrix.name }}
          path: toolchain-artifacts/${{ matrix.name }}
          compression-level: 0

  toolchain-summary:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - sandbox
      - toolchain-profile
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: toolchain-profile-*
          path: toolchain-artifacts
          merge-multiple: false
      - id: bundle
        run: |
          shopt -s nullglob
          dirs=(toolchain-artifacts/toolchain-profile-*)
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo "No toolchain profile artifacts were produced." >> "$GITHUB_STEP_SUMMARY"
            echo "has_artifacts=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "has_artifacts=true" >> "${GITHUB_OUTPUT}"
      - run: |
          shopt -s nullglob
          for dir in toolchain-artifacts/toolchain-profile-*; do
            cat "${dir}/summary.md" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
          done
        if: steps.bundle.outputs.has_artifacts == 'true'
      - run: |
          find toolchain-artifacts -type f | sort > toolchain-artifacts/MANIFEST.txt
        if: steps.bundle.outputs.has_artifacts == 'true'
      - uses: actions/upload-artifact@v4
        if: steps.bundle.outputs.has_artifacts == 'true'
        with:
          name: toolchain-summary-bundle
          path: toolchain-artifacts
          compression-level: 0

  mixin-smoke:
    runs-on: ubuntu-latest
    needs:
      - policy
      - unit
      - sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-buildx-action@v3
      - run: chmod +x scripts/build_runtime_images.sh
      - run: ./scripts/build_runtime_images.sh -mode production -only type-i -tag-prefix "aonohako-ci-mix"
      - run: >
          docker run --rm "aonohako-ci-mix:type-i" bash -lc
          "printf '%s\n' '#include <stdio.h>' 'int main(void) { puts(\"ok\"); return 0; }' > Main.c &&
          gcc -O2 -pipe Main.c -o Main &&
          [ \"\$(./Main)\" = ok ]"
      - run: >
          docker run --rm "aonohako-ci-mix:type-i" python3 -c
          "from pathlib import Path; import numpy as np; Path('same-folder.txt').write_text(str(int(np.arange(5).sum())), encoding='utf-8'); assert Path('same-folder.txt').read_text(encoding='utf-8') == '10'; print('ok')"
      - run: >
          docker run --rm "aonohako-ci-mix:type-i" bash -lc
          "printf '%s\n' 'public class Main {' '  public static void main(String[] args) {' '    System.out.println(\"ok\");' '  }' '}' > Main.java &&
          javac --release 11 Main.java &&
          java Main | grep '^ok$'"

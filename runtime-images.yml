    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.v <<'COQ'
          Theorem same_folder_ok : 1 = 1.
          Proof. reflexivity. Qed.
          COQ
          if command -v rocq >/dev/null 2>&1; then
            rocq c Main.v
          else
            coqc -q Main.v
          fi
          [ -f Main.vo ]

  scheme:
    install:
      apt:
        - build-essential
        - git
        - make
      script:
        - export CHIBI_COMMIT=97faa0bf2d123c558d7ab79216906567c44cb03c
        - git clone https://github.com/ashinn/chibi-scheme /opt/chibi-scheme
        - cd /opt/chibi-scheme && git checkout "${CHIBI_COMMIT}" && make && make install

      apt:
        - gcc
        - libc6-dev
        - ldc
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.d <<'D'
          import std.file : write, readText;
          import std.stdio : writeln;
          void main() {
              write("same-folder.txt", "ok");
              writeln(readText("same-folder.txt"));
          }
          D
          ldc2 Main.d -O3 -release -of=Main
          ./Main | grep '^ok$'
          cat > Broken.d <<'D'
          void main() {
              this is invalid;
          }
          D
          if ldc2 Broken.d -O3 -release -of=Broken >/dev/null 2>&1; then exit 1; fi

  coq:
    install:
      apt:
        - coq
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.v <<'COQ'
          Theorem same_folder_ok : 1 = 1.
          Proof. reflexivity. Qed.
          COQ
          coqc -q Main.v
          [ -f Main.vo ]
          cat > Broken.v <<'COQ'
          Theorem broken : 1 = 2.
          Proof. reflexivity. Qed.
          COQ
          if coqc -q Broken.v >/dev/null 2>&1; then exit 1; fi

  rust:
    install:
      apt:
        - curl
        - gcc
        - g++
      script:
        - export RUSTUP_HOME=/usr/local/rustup
        - export CARGO_HOME=/usr/local/cargo
        - export PATH=/usr/local/cargo/bin:$PATH
        - mkdir -p "$RUSTUP_HOME" "$CARGO_HOME"
        - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable --no-modify-path
        - ln -sfn /usr/local/cargo/bin/rustc /usr/local/bin/rustc
        - ln -sfn /usr/local/cargo/bin/cargo /usr/local/bin/cargo
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'fn main() {' '    println!("ok");' '}' > main.rs
          rustc --edition 2024 -O -o Main main.rs
          ./Main | grep '^ok$'

  kotlin:
    install:
      apt:
        - curl
        - default-jre-headless
        - xz-utils
      script:
        - export KONAN_VERSION=1.8.10
        - curl -fsSL "https://github.com/JetBrains/kotlin/releases/download/v${KONAN_VERSION}/kotlin-native-linux-x86_64-${KONAN_VERSION}.tar.gz" -o /tmp/kotlin-native.tar.gz
        - mkdir -p /opt
        - tar -xzf /tmp/kotlin-native.tar.gz -C /opt
        - ln -sfn "/opt/kotlin-native-linux-x86_64-${KONAN_VERSION}/bin/kotlinc-native" /usr/local/bin/kotlinc-native
        - ln -sfn "/opt/kotlin-native-linux-x86_64-${KONAN_VERSION}/bin/run_konan" /usr/local/bin/run_konan
        - rm -f /tmp/kotlin-native.tar.gz
    smoke:
      command:
        - bash
        - -lc
        - |
          mkdir -p /tmp/.konan /tmp/.konan.home
          printf '%s\n' 'fun main() {' '  println("ok")' '}' > Main.kt
          env KONAN_DATA_DIR=/tmp/.konan KONAN_USER_HOME=/tmp/.konan.home kotlinc-native Main.kt -o Main
          ./Main.kexe | grep '^ok$'

  pascal:
    install:
      apt:
        - fp-compiler
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.pas <<'PAS'
          program Main;
          var
            F: Text;
            Line: string;
          begin
            Assign(F, 'same-folder.txt');
            Rewrite(F);
            Writeln(F, 'ok');
            Close(F);
            Assign(F, 'same-folder.txt');
            Reset(F);
            ReadLn(F, Line);
            Close(F);
            Writeln(Line);
          end.
          PAS
          fpc -O2 -Xs -oMain Main.pas >/dev/null
          ./Main | grep '^ok$'
          cat > Broken.pas <<'PAS'
          program Broken;
          begin
            Writeln('oops')
          PAS
          if fpc -O2 -Xs -oBroken Broken.pas >/dev/null 2>&1; then exit 1; fi

  nim:
    install:
      apt:
        - curl
        - gcc
        - libc6-dev
        - xz-utils
      script:
        - export PATH="/root/.nimble/bin:${PATH}"
        - curl https://nim-lang.org/choosenim/init.sh -sSf | sh -s -- -y
        - choosenim 2.2.8
        - ln -sfn /root/.nimble/bin/nim /usr/local/bin/nim
        - ln -sfn /root/.nimble/bin/nimble /usr/local/bin/nimble
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.nim <<'NIM'
          import std/[os, strutils]
          writeFile("same-folder.txt", "ok")
          echo readFile("same-folder.txt").strip()
          NIM
          nim c -d:release --opt:speed --out:Main Main.nim >/dev/null
          ./Main | grep '^ok$'
          cat > Broken.nim <<'NIM'
          proc main() =
            echo "oops"
          this is invalid
          NIM
          if nim c -d:release --opt:speed --out:Broken Broken.nim >/dev/null 2>&1; then exit 1; fi

  clojure:
    install:
      apt:
        - clojure
        - default-jre-headless
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.clj <<'CLOJURE'
          (require '[clojure.string :as str])
          (spit "same-folder.txt" "ok")
          (println (str/trim (slurp "same-folder.txt")))
          CLOJURE
          clojure Main.clj | grep '^ok$'
          cat > Broken.clj <<'CLOJURE'
          (defn broken []
            (println "oops"
          CLOJURE
          if clojure -e "(require '[clojure.java.io :as io]) (with-open [r (java.io.PushbackReader. (io/reader (first *command-line-args*)))] (loop [] (let [form (read {:eof ::eof} r)] (when-not (= form ::eof) (recur)))))" Broken.clj >/dev/null 2>&1; then exit 1; fi

  racket:
    install:
      apt:
        - racket
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.rkt <<'RACKET'
          #lang racket
          (require racket/string)
          (call-with-output-file "same-folder.txt"
            (lambda (out) (displayln "ok" out))
            #:exists 'replace)
          (displayln (string-trim (file->string "same-folder.txt")))
          RACKET
          raco make Main.rkt >/dev/null
          racket Main.rkt | grep '^ok$'
          cat > Broken.rkt <<'RACKET'
          #lang racket
          (displayln "oops"
          RACKET
          if raco make Broken.rkt >/dev/null 2>&1; then exit 1; fi

  ada:
    install:
      apt:
        - gnat
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.adb <<'ADA'
          with Ada.Text_IO; use Ada.Text_IO;
          procedure Main is
            F : File_Type;
          begin
            Create(F, Out_File, "same-folder.txt");
            Put_Line(F, "ok");
            Close(F);
            Open(F, In_File, "same-folder.txt");
            Put_Line(Get_Line(F));
            Close(F);
          end Main;
          ADA
          gnatmake -O2 -o Main Main.adb >/dev/null
          ./Main | grep '^ok$'
          cat > Broken.adb <<'ADA'
          with Ada.Text_IO; use Ada.Text_IO;
          procedure Broken is
          begin
            Put_Line("oops")
          end Broken;
          ADA
          if gnatmake -O2 -o Broken Broken.adb >/dev/null 2>&1; then exit 1; fi

  dart:
    install:
      apt:
        - curl
        - unzip
      script:
        - export DART_VERSION=3.11.5
        - curl -fsSL "https://storage.googleapis.com/dart-archive/channels/stable/release/${DART_VERSION}/sdk/dartsdk-linux-x64-release.zip" -o /tmp/dartsdk.zip
        - rm -rf /opt/dart-sdk
        - unzip -q /tmp/dartsdk.zip -d /opt
        - ln -sfn /opt/dart-sdk/bin/dart /usr/local/bin/dart
        - rm -f /tmp/dartsdk.zip
        - dart --version
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.dart <<'DART'
          import 'dart:io';
          void main() {
            File('same-folder.txt').writeAsStringSync('ok');
            stdout.writeln(File('same-folder.txt').readAsStringSync().trim());
          }
          DART
          dart compile exe Main.dart -o Main >/dev/null
          ./Main | grep '^ok$'
          cat > Broken.dart <<'DART'
          void main() {
            print('oops'
          }
          DART
          if dart compile exe Broken.dart -o Broken >/dev/null 2>&1; then exit 1; fi

  csharp:
    install:
      apt:
        - curl
        - libicu76
      script:
        - mkdir -p /opt/dotnet
        - curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
        - bash /tmp/dotnet-install.sh --channel 8.0 --install-dir /opt/dotnet
        - ln -sfn /opt/dotnet/dotnet /usr/local/bin/dotnet
        - rm -f /tmp/dotnet-install.sh
    smoke:
      command:
        - bash
        - -lc
        - |
          mkdir -p /tmp/csharp-home /tmp/csharp-packages
          env HOME=/tmp/csharp-home DOTNET_CLI_HOME=/tmp/csharp-home NUGET_PACKAGES=/tmp/csharp-packages DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_CLI_TELEMETRY_OPTOUT=1 DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE=1 DOTNET_GENERATE_ASPNET_CERTIFICATE=false DOTNET_NOLOGO=1 MSBuildEnableWorkloadResolver=false dotnet new console --force --no-restore --verbosity quiet -n App -o app
          printf '%s\n' 'Console.WriteLine("ok");' > app/Program.cs
          env HOME=/tmp/csharp-home DOTNET_CLI_HOME=/tmp/csharp-home NUGET_PACKAGES=/tmp/csharp-packages DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_CLI_TELEMETRY_OPTOUT=1 DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE=1 DOTNET_GENERATE_ASPNET_CERTIFICATE=false DOTNET_NOLOGO=1 MSBuildEnableWorkloadResolver=false dotnet publish app --configuration Release -o publish
          dotnet ./publish/App.dll | grep '^ok$'

  fsharp:
    install:
      apt:
        - curl
        - libicu76
      script:
        - mkdir -p /opt/dotnet
        - curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
        - bash /tmp/dotnet-install.sh --channel 8.0 --install-dir /opt/dotnet
        - ln -sfn /opt/dotnet/dotnet /usr/local/bin/dotnet
        - rm -f /tmp/dotnet-install.sh
    smoke:
      command:
        - bash
        - -lc
        - |
          mkdir -p /tmp/fsharp-home /tmp/fsharp-packages
          cat > App.fsproj <<'FSPROJ'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include="Program.fs" />
            </ItemGroup>
          </Project>
          FSPROJ
          cat > Program.fs <<'FS'
          open System.IO
          [<EntryPoint>]
          let main _ =
              File.WriteAllText("same-folder.txt", "ok")
              printfn "%s" (File.ReadAllText("same-folder.txt"))
              0
          FS
          env HOME=/tmp/fsharp-home DOTNET_CLI_HOME=/tmp/fsharp-home NUGET_PACKAGES=/tmp/fsharp-packages DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_CLI_TELEMETRY_OPTOUT=1 DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE=1 DOTNET_GENERATE_ASPNET_CERTIFICATE=false DOTNET_NOLOGO=1 MSBuildEnableWorkloadResolver=false dotnet publish App.fsproj --configuration Release -o publish -p:UseAppHost=false
          dotnet ./publish/App.dll | grep '^ok$'

  uhmlang:
    install:
      apt:
        - git
      script:
        - ln -sfn /usr/local/go/bin/go /usr/local/bin/go
        - ln -sfn /usr/local/go/bin/gofmt /usr/local/bin/gofmt
        - git clone --depth=1 https://github.com/rycont/umjunsik-lang.git /tmp/umjunsik-lang
        - cd /tmp/umjunsik-lang/umjunsik-lang-go && env -u GOROOT GOENV=off go build -o /usr/local/bin/umjunsik-lang-go .
        - ln -sfn /usr/local/bin/umjunsik-lang-go /usr/bin/umjunsik-lang-go
        - rm -rf /tmp/umjunsik-lang
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' '어떻게' '식........... ........ㅋ' '이 사람이름이냐ㅋㅋ' > Main.uhm
          /usr/bin/umjunsik-lang-go Main.uhm | grep '^X$'


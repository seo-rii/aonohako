languages:
  plain:
    install:
      apt:
        - gcc
        - g++
        - libc6-dev
        - make
    smoke:
      command:
        - /bin/sh
        - -c
        - |
          printf '%s\n' '#include <stdio.h>' 'int main(void) {' '  puts("ok");' '  return 0;' '}' > Main.c
          gcc -O2 -pipe Main.c -o Main
          [ "$(./Main)" = ok ]

  aheui:
    install:
      apt:
        - python3
        - python3-pip
      pip:
        - aheui==1.2.5
    smoke:
      command:
        - /bin/sh
        - -c
        - |
          printf '%s' '밞바밤밣받밞밞밞밦밞바밝밣바박박밦밞받밞받밞발밣받뱔희밞땨몋드떠받볋' > Main.aheui
          output="$(aheui Main.aheui 2>/tmp/aheui.stderr || true)"
          printf '%s\n' "${output}" | grep '^Hello, World!$'

  asm:
    install:
      apt:
        - gcc
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.s <<'ASM'
          .global _start
          .section .text
          _start:
              mov $1, %rax
              mov $1, %rdi
              lea msg(%rip), %rsi
              mov $3, %rdx
              syscall
              mov $60, %rax
              xor %rdi, %rdi
              syscall
          .section .rodata
          msg:
              .ascii "ok\n"
          ASM
          gcc -nostdlib -static -no-pie Main.s -o Main
          ./Main | grep '^ok$'
          cat > Broken.s <<'ASM'
          .global _start
          .section .text
          _start:
              mov %rax, $1
          ASM
          if gcc -nostdlib -static -no-pie Broken.s -o Broken >/dev/null 2>&1; then exit 1; fi

  nasm:
    install:
      apt:
        - gcc
        - nasm
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.asm <<'ASM'
          default rel
          global _start
          section .text
          _start:
              mov rax, 1
              mov rdi, 1
              lea rsi, [rel msg]
              mov rdx, msg_len
              syscall
              mov rax, 60
              xor rdi, rdi
              syscall
          section .rodata
          msg: db "ok", 10
          msg_len equ $ - msg
          ASM
          nasm -felf64 Main.asm -o Main.o
          gcc -nostdlib -static -no-pie Main.o -o Main
          ./Main | grep '^ok$'
          cat > Broken.asm <<'ASM'
          global _start
          section .text
          _start:
              mov raxx, 60
          ASM
          if nasm -felf64 Broken.asm -o Broken.o >/dev/null 2>&1; then exit 1; fi

  python:
    install:
      apt:
        - python3
        - python3-pip
      pip:
        - numpy==2.4.4
        - pandas==3.0.2
        - seaborn==0.13.2
        - matplotlib==3.10.8
        - pillow==12.2.0
        - six==1.17.0
        - qiskit==2.4.0
        - pyparsing==3.3.2
        - pylatexenc==2.10
        - jax[cpu]==0.10.0
      script:
        - python3 -m pip install --break-system-packages --no-cache-dir --index-url https://download.pytorch.org/whl/cpu torch==2.11.0+cpu torchvision==0.26.0+cpu
    smoke:
      command:
        - python3
        - -c
        - |
          import jax.numpy as jnp
          import pathlib
          import numpy as np
          import pandas as pd
          import PIL.Image
          import qiskit
          import robot_judge
          import seaborn as sns
          import torch
          from jungol_robot import Direction, Position
          total = int(np.arange(5).sum())
          assert int(pd.Series([1, 2, 3]).sum()) == 6
          assert torch.tensor([1, 2]).sum().item() == 3
          assert int(jnp.arange(5).sum()) == 10
          assert callable(PIL.Image.new)
          assert callable(qiskit.QuantumCircuit)
          assert sns.__version__
          assert Direction("r").to_char() == "r"
          assert (Position(1, 2) + Position(3, 4)).to_list() == [4, 6]
          assert robot_judge.parse_expected_state("1 2 R") == (1, 2, "R")
          assert robot_judge.simulate_robot([], start=(0, 0), direction="R") == (0, 0, "R")
          pathlib.Path("same-folder.txt").write_text(str(total), encoding="utf-8")
          assert pathlib.Path("same-folder.txt").read_text(encoding="utf-8") == "10"

  pypy:
    install:
      apt:
        - pypy3
    smoke:
      command:
        - pypy3
        - -c
        - |
          import sys
          from pathlib import Path
          assert sys.implementation.name == "pypy"
          Path("same-folder.txt").write_text("ok", encoding="utf-8")
          print(Path("same-folder.txt").read_text(encoding="utf-8"))


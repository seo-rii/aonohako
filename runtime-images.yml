languages:
  plain:
    smoke:
      command:
        - /bin/sh
        - -c
        - |
          printf '#!/bin/sh\necho ok\n' > Main
          chmod +x Main
          [ "$(./Main)" = ok ]
  python:
    install:
      apt:
        - python3
        - python3-numpy
    smoke:
      command:
        - python3
        - -c
        - |
          import pathlib
          import numpy as np
          total = int(np.arange(5).sum())
          pathlib.Path("same-folder.txt").write_text(str(total), encoding="utf-8")
          assert pathlib.Path("same-folder.txt").read_text(encoding="utf-8") == "10"
  java:
    install:
      apt:
        - bash
        - openjdk-17-jdk-headless
    smoke:
      command:
        - bash
        - -lc
        - |
          cat <<'EOF' > Main.java
          public class Main {
            public static void main(String[] args) {
              System.out.println("ok");
            }
          }
          EOF
          javac Main.java
          java Main | grep '^ok$'
profiles:
  type-a:
    base_image: debian:bookworm-slim
    languages:
      - plain
      - python
  type-b:
    base_image: debian:bookworm-slim
    languages:
      - java

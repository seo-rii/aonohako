      script:
        - export LEAN_VERSION=4.29.1
        - curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "https://github.com/leanprover/lean4/releases/download/v${LEAN_VERSION}/lean-${LEAN_VERSION}-linux.zip" -o /tmp/lean.zip
        - rm -rf /opt/lean
        - unzip -q /tmp/lean.zip -d /opt
        - mv "/opt/lean-${LEAN_VERSION}-linux" /opt/lean
        - ln -sfn /opt/lean/bin/lean /usr/local/bin/lean
        - ln -sfn /opt/lean/bin/lake /usr/local/bin/lake
        - rm -f /tmp/lean.zip
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'theorem ok : True := by trivial' > Main.lean
          lean Main.lean

  agda:
    install:
      apt:
        - agda
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.agda <<'AGDA'
          module Main where
          data Unit : Set where
            tt : Unit
          ok : Unit
          ok = tt
          AGDA
          agda Main.agda >/dev/null

  dafny:
    install:
      apt:
        - curl
        - unzip
      script:
        - export DAFNY_VERSION=4.11.0
        - curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "https://github.com/dafny-lang/dafny/releases/download/v${DAFNY_VERSION}/dafny-${DAFNY_VERSION}-x64-ubuntu-22.04.zip" -o /tmp/dafny.zip
        - rm -rf /opt/dafny
        - unzip -q /tmp/dafny.zip -d /opt/dafny
        - ln -sfn /opt/dafny/dafny/dafny /usr/local/bin/dafny
        - rm -f /tmp/dafny.zip
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'method Main() ensures true {' '}' > Main.dfy
          dafny verify Main.dfy >/dev/null

  tla:
    install:
      apt:
        - curl
        - default-jre-headless
      script:
        - export TLA_VERSION=1.7.4
        - curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "https://github.com/tlaplus/tlaplus/releases/download/v${TLA_VERSION}/tla2tools.jar" -o /usr/local/lib/aonohako/tla2tools.jar
        - chmod 0644 /usr/local/lib/aonohako/tla2tools.jar
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.tla <<'TLA'
          ---- MODULE Main ----
          VARIABLE x
          Init == x = 0
          Next == x' = x
          ====
          TLA
          aonohako-tla-run Main.tla

  why3:
    install:
      apt:
        - why3
        - z3
      script:
        - install -d -m 0755 /usr/local/lib/aonohako/why3-home
        - env HOME=/usr/local/lib/aonohako/why3-home why3 config detect
        - chmod -R a+rX /usr/local/lib/aonohako/why3-home
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'theory Main' '  goal G: true' 'end' > Main.mlw
          aonohako-why3-prove Main.mlw

  isabelle:
    install:
      apt:
        - curl
        - perl
        - tar
      script:
        - export ISABELLE_VERSION=Isabelle2025-2
        - curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "https://isabelle.in.tum.de/website-Isabelle2025-2/dist/${ISABELLE_VERSION}_linux.tar.gz" -o /tmp/isabelle.tar.gz
        - tar -xzf /tmp/isabelle.tar.gz -C /opt
        - ln -sfn "/opt/${ISABELLE_VERSION}/bin/isabelle" /usr/local/bin/isabelle
        - rm -f /tmp/isabelle.tar.gz
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > ROOT <<'ROOT'
          session Aonohako = HOL +
            theories Aonohako_Main
          ROOT
          cat > Aonohako_Main.thy <<'THY'
          theory Aonohako_Main
            imports Main
          begin
          theorem ok: True by simp
          end
          THY
          isabelle build -D . >/dev/null

  vb6:
    install:
      apt:
        - ruby
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'Sub Main()' 'Print "ok"' 'End Sub' > Main.bas
          aonohako-vb6-run Main.bas | grep '^ok$'

  smalltalk:
    install:
      apt:
        - build-essential
        - curl
        - file
        - libffi-dev
        - libreadline-dev
        - libsigsegv-dev
      script:
        - export GST_VERSION=3.2.5
        - curl -fsSL "https://ftp.gnu.org/gnu/smalltalk/smalltalk-${GST_VERSION}.tar.gz" -o /tmp/smalltalk.tar.gz
        - tar -xzf /tmp/smalltalk.tar.gz -C /tmp
        - (cd "/tmp/smalltalk-${GST_VERSION}" && ./configure --prefix=/usr/local && make -j"$(nproc)" && make install)
        - rm -rf "/tmp/smalltalk-${GST_VERSION}" /tmp/smalltalk.tar.gz
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' "'ok' displayNl" > Main.st
          gst -q Main.st | grep '^ok$'

  golfscript:
    install:
      apt:
        - ruby
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s' '"ok\n"' > Main.gs
          ruby /usr/local/lib/aonohako/golfscript_sandboxed.rb Main.gs | grep '^ok$'

  mojo:
    install:
      apt:
        - curl
        - python3
        - python3-venv
      script:
        - python3 -m venv /opt/mojo-venv
        - /opt/mojo-venv/bin/pip install --no-cache-dir --extra-index-url https://modular.gateway.scarf.sh/simple/ mojo==0.26.2.0
        - ln -sfn /opt/mojo-venv/bin/mojo /usr/local/bin/mojo
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'def main():' '    print("ok")' > Main.mojo
          mojo build Main.mojo -o Main
          ./Main | grep '^ok$'

  deno:
    install:
      apt:
        - curl
        - unzip
      script:
        - export DENO_VERSION=2.7.14
        - curl -fsSL "https://github.com/denoland/deno/releases/download/v${DENO_VERSION}/deno-x86_64-unknown-linux-gnu.zip" -o /tmp/deno.zip
        - unzip -q /tmp/deno.zip -d /usr/local/bin
        - chmod 0755 /usr/local/bin/deno
        - rm -f /tmp/deno.zip
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'console.log("ok");' > Main.ts
          deno check --cached-only Main.ts
          deno run --no-prompt --cached-only Main.ts | grep '^ok$'

  kotlin-jvm:
    install:
      apt:
        - curl
        - default-jre-headless
        - unzip
      script:
        - export KOTLIN_JVM_VERSION=2.3.21
        - curl -fsSL "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_JVM_VERSION}/kotlin-compiler-${KOTLIN_JVM_VERSION}.zip" -o /tmp/kotlin-compiler.zip
        - unzip -q /tmp/kotlin-compiler.zip -d /opt
        - ln -sfn /opt/kotlinc/bin/kotlinc /usr/local/bin/kotlinc
        - rm -f /tmp/kotlin-compiler.zip
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'fun main() {' '  println("ok")' '}' > Main.kt
          kotlinc Main.kt -include-runtime -d Main.jar
          java -jar Main.jar | grep '^ok$'

  duckdb:
    install:
      apt:
        - curl
        - unzip
      script:
        - export DUCKDB_VERSION=1.5.2
        - curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip" -o /tmp/duckdb.zip
        - unzip -q /tmp/duckdb.zip -d /usr/local/bin
        - chmod 0755 /usr/local/bin/duckdb
        - rm -f /tmp/duckdb.zip
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' "select 'ok';" > Main.sql
          aonohako-duckdb-run Main.sql | grep '^ok$'

  bqn:
    install:
      apt:
        - build-essential
        - git
        - libffi-dev
      script:
        - export CBQN_COMMIT=d56147be877693eaed351745782c258bd7424de7
        - git clone --recursive https://github.com/dzaima/CBQN /opt/cbqn
        - cd /opt/cbqn && git checkout "${CBQN_COMMIT}" && git submodule update --init --recursive && make REPLXX=0
        - install -m 0755 /opt/cbqn/BQN /usr/local/bin/bqn
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' '•Out "ok"' > Main.bqn
          bqn Main.bqn | grep '^ok$'

  apl:
    install:
      apt:
        - curl
        - xz-utils
      script:
        - export NODE_VERSION=24.15.0
        - curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o /tmp/node.tar.xz
        - rm -rf "/opt/node-v${NODE_VERSION}-linux-x64"
        - mkdir -p /opt
        - tar -xJf /tmp/node.tar.xz -C /opt
        - ln -sfn "/opt/node-v${NODE_VERSION}-linux-x64/bin/node" /usr/local/bin/node
        - ln -sfn "/opt/node-v${NODE_VERSION}-linux-x64/bin/node" /usr/local/bin/nodejs
        - ln -sfn "/opt/node-v${NODE_VERSION}-linux-x64/bin/npm" /usr/local/bin/npm
        - ln -sfn "/opt/node-v${NODE_VERSION}-linux-x64/bin/npx" /usr/local/bin/npx
        - rm -f /tmp/node.tar.xz
      npm:
        - kanapl@0.0.0
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' "⎕←'ok'" > Main.apl
          apl --script -f Main.apl | grep '^ok$'

  uiua:
    install:
      apt:
        - curl
        - unzip
      script:
        - export UIUA_VERSION=0.18.1
        - curl -fsSL "https://github.com/uiua-lang/uiua/releases/download/${UIUA_VERSION}/uiua-bin-x86_64-unknown-linux-gnu-no-audio.zip" -o /tmp/uiua.zip
        - unzip -q /tmp/uiua.zip -d /usr/local/bin
        - chmod 0755 /usr/local/bin/uiua
        - rm -f /tmp/uiua.zip
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' '&p "ok"' > Main.ua
          uiua run Main.ua --no-format | grep '^ok$'

  janet:
    install:
      apt:
        - curl
      script:
        - export JANET_VERSION=1.41.2
        - curl -fsSL "https://github.com/janet-lang/janet/releases/download/v${JANET_VERSION}/janet-v${JANET_VERSION}-linux-x64.tar.gz" -o /tmp/janet.tar.gz
        - mkdir -p /opt/janet
        - tar -xzf /tmp/janet.tar.gz -C /opt/janet --strip-components=1
        - ln -sfn /opt/janet/bin/janet /usr/local/bin/janet
        - rm -f /tmp/janet.tar.gz
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' '(print "ok")' > Main.janet
          janet Main.janet | grep '^ok$'

  uhmlang:
    install:
      apt:
        - git
      script:
        - ln -sfn /usr/local/go/bin/go /usr/local/bin/go
        - ln -sfn /usr/local/go/bin/gofmt /usr/local/bin/gofmt
        - git clone --depth=1 https://github.com/rycont/umjunsik-lang.git /tmp/umjunsik-lang
        - cd /tmp/umjunsik-lang/umjunsik-lang-go && env -u GOROOT GOENV=off go build -o /usr/local/bin/umjunsik-lang-go .
        - ln -sfn /usr/local/bin/umjunsik-lang-go /usr/bin/umjunsik-lang-go
        - rm -rf /tmp/umjunsik-lang
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' '어떻게' '식........... ........ㅋ' '이 사람이름이냐ㅋㅋ' > Main.uhm
          /usr/bin/umjunsik-lang-go Main.uhm | grep '^X$'

profiles:
  type-a:
    base_image: debian:trixie-slim@sha256:cedb1ef40439206b673ee8b33a46a03a0c9fa90bf3732f54704f99cb061d2c5a
    install: &gcc16_profile
      script:
        - echo 'deb http://deb.debian.org/debian sid main' > /etc/apt/sources.list.d/aonohako-gcc16-sid.list
        - apt-get update
        - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends -t sid gcc-16 g++-16
        - rm -rf /var/lib/apt/lists/*
        - ln -sfn /usr/bin/gcc-16 /usr/local/bin/gcc
        - ln -sfn /usr/bin/g++-16 /usr/local/bin/g++

          python3 /usr/local/lib/aonohako/brainfuck.py Main.bf | grep '^Hello World!$'

  wasm:
    install:
      apt:
        - curl
        - wabt
        - xz-utils
      script:
        - export WASMTIME_VERSION=44.0.0
        - curl -fsSL "https://github.com/bytecodealliance/wasmtime/releases/download/v${WASMTIME_VERSION}/wasmtime-v${WASMTIME_VERSION}-x86_64-linux.tar.xz" -o /tmp/wasmtime.tar.xz
        - install -d /tmp/wasmtime
        - tar -xJf /tmp/wasmtime.tar.xz -C /tmp/wasmtime --strip-components=1
        - install -m 0755 /tmp/wasmtime/wasmtime /usr/local/bin/wasmtime
        - rm -rf /tmp/wasmtime /tmp/wasmtime.tar.xz
        - test -x /usr/local/bin/wasmtime
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.wat <<'WAT'
          (module
            (import "wasi_snapshot_preview1" "fd_write"
              (func $fd_write (param i32 i32 i32 i32) (result i32)))
            (memory 1)
            (export "memory" (memory 0))
            (data (i32.const 8) "ok\n")
            (func (export "_start")
              i32.const 0
              i32.const 8
              i32.store
              i32.const 4
              i32.const 3
              i32.store
              i32.const 1
              i32.const 0
              i32.const 1
              i32.const 20
              call $fd_write
              drop))
          WAT
          wat2wasm Main.wat -o Main.wasm
          wasmtime run --dir=. \
            -O memory-reservation=33554432 \
            -O memory-reservation-for-growth=0 \
            -O memory-guard-size=65536 \
            -W max-memory-size=33554432 \
            -W max-memories=1 \
            -W max-instances=1 \
            -W max-tables=1 \
            -W max-table-elements=65536 \
            -W max-wasm-stack=1048576 \
            -W trap-on-grow-failure=y \
            Main.wasm | grep '^ok$'


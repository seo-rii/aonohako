languages:
  plain:
    install:
      apt:
        - gcc
        - g++
        - make
    smoke:
      command:
        - /bin/sh
        - -c
        - |
          printf '%s\n' '#include <stdio.h>' 'int main(void) {' '  puts("ok");' '  return 0;' '}' > Main.c
          gcc -O2 -pipe Main.c -o Main
          [ "$(./Main)" = ok ]

  python:
    install:
      apt:
        - python3
        - python3-pip
        - python3-numpy
    smoke:
      command:
        - python3
        - -c
        - |
          import pathlib
          import numpy as np
          total = int(np.arange(5).sum())
          pathlib.Path("same-folder.txt").write_text(str(total), encoding="utf-8")
          assert pathlib.Path("same-folder.txt").read_text(encoding="utf-8") == "10"

  pypy:
    install:
      apt:
        - pypy3
    smoke:
      command:
        - pypy3
        - -c
        - |
          from pathlib import Path
          Path("same-folder.txt").write_text("ok", encoding="utf-8")
          print(Path("same-folder.txt").read_text(encoding="utf-8"))

  java:
    install:
      apt:
        - bash
        - openjdk-17-jdk-headless
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'public class Main {' '  public static void main(String[] args) {' '    System.out.println("ok");' '  }' '}' > Main.java
          javac --release 11 Main.java
          java Main | grep '^ok$'

  groovy:
    install:
      apt:
        - bash
        - groovy
        - openjdk-17-jdk-headless
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.groovy <<'GROOVY'
          class Main {
              static void main(String[] args) {
                  new File("same-folder.txt").text = "ok"
                  println new File("same-folder.txt").text.trim()
              }
          }
          GROOVY
          groovyc -d . Main.groovy
          groovy -cp . Main | grep '^ok$'
          cat > Broken.groovy <<'GROOVY'
          class Broken {
              static void main(String[] args) {
                  println(
              }
          }
          GROOVY
          if groovyc -d . Broken.groovy >/dev/null 2>&1; then exit 1; fi

  scala:
    install:
      apt:
        - bash
        - openjdk-17-jdk-headless
        - scala
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'object Main extends App {' '  val path = new java.io.File("same-folder.txt")' '  val writer = new java.io.PrintWriter(path, "UTF-8")' '  writer.write("ok")' '  writer.close()' '  println(scala.io.Source.fromFile(path, "UTF-8").mkString.trim)' '}' > Main.scala
          scalac Main.scala
          scala -nocompdaemon -classpath . Main | grep '^ok$'

  javascript:
    install:
      apt:
        - nodejs
        - npm
    smoke:
      command:
        - node
        - -e
        - |
          const fs = require('fs');
          fs.writeFileSync('same-folder.txt', 'ok');
          console.log(fs.readFileSync('same-folder.txt', 'utf8'));

  typescript:
    install:
      apt:
        - nodejs
        - npm
      npm:
        - typescript
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' "import { writeFileSync, readFileSync } from 'fs';" "writeFileSync('same-folder.txt', 'ok');" "console.log(readFileSync('same-folder.txt', 'utf8'));" > Main.ts
          tsc Main.ts --module commonjs --target es2019 --outDir dist
          node dist/Main.js | grep '^ok$'

  ruby:
    install:
      apt:
        - ruby-full
    smoke:
      command:
        - ruby
        - -e
        - |
          File.write("same-folder.txt", "ok")
          puts File.read("same-folder.txt")

  php:
    install:
      apt:
        - php
    smoke:
      command:
        - php
        - -r
        - |
          file_put_contents("same-folder.txt", "ok");
          echo file_get_contents("same-folder.txt"), PHP_EOL;

  lua:
    install:
      apt:
        - lua5.4
    smoke:
      command:
        - lua5.4
        - -e
        - |
          local f = assert(io.open("same-folder.txt", "w"))
          f:write("ok")
          f:close()
          local r = assert(io.open("same-folder.txt", "r"))
          print(r:read("*a"))
          r:close()

  perl:
    install:
      apt:
        - perl
    smoke:
      command:
        - perl
        - -e
        - |
          open my $fh, '>', 'same-folder.txt' or die $!;
          print {$fh} "ok";
          close $fh;
          open my $rfh, '<', 'same-folder.txt' or die $!;
          print scalar <$rfh>;
          close $rfh;

  elixir:
    install:
      apt:
        - elixir
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'File.write!("same-folder.txt", "ok")' 'IO.puts(File.read!("same-folder.txt"))' > Main.exs
          env ERL_AFLAGS='+MIscs 128 +S 1:1 +A 1' elixir Main.exs | grep '^ok$'

  haskell:
    install:
      apt:
        - ghc
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'main :: IO ()' 'main = do' '  writeFile "same-folder.txt" "ok"' '  readFile "same-folder.txt" >>= putStrLn' > Main.hs
          ghc -O2 -o Main Main.hs
          ./Main | grep '^ok$'

  lisp:
    install:
      apt:
        - sbcl
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.lisp <<'LISP'
          (with-open-file (out "same-folder.txt"
                               :direction :output
                               :if-exists :supersede
                               :if-does-not-exist :create)
            (write-line "ok" out))
          (with-open-file (in "same-folder.txt" :direction :input)
            (format t "~a~%" (read-line in nil "")))
          LISP
          sbcl --noinform --script Main.lisp | grep '^ok$'
          cat > Broken.lisp <<'LISP'
          (format t "ok"
          LISP
          if sbcl --noinform --script Broken.lisp >/dev/null 2>&1; then exit 1; fi

  swift:
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'import Foundation' 'try! "ok".write(toFile: "same-folder.txt", atomically: true, encoding: .utf8)' 'print(try! String(contentsOfFile: "same-folder.txt").trimmingCharacters(in: .whitespacesAndNewlines))' > Main.swift
          swiftc -O Main.swift -o Main
          ./Main | grep '^ok$'

  sqlite:
    install:
      apt:
        - sqlite3
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'create table numbers(v integer);' 'insert into numbers(v) values (1),(2),(3);' 'select sum(v) from numbers;' > Main.sql
          [ "$(sqlite3 same-folder.db < Main.sql)" = 6 ]
          [ -f same-folder.db ]

  julia:
    install:
      script:
        - ln -sfn /usr/local/julia/bin/julia /usr/local/bin/julia
    smoke:
      command:
        - julia
        - --startup-file=no
        - --history-file=no
        - --color=no
        - -e
        - |
          using Statistics
          open("same-folder.txt", "w") do io
              write(io, string(mean([1, 2, 3])))
          end
          println(read("same-folder.txt", String))

  r:
    install:
      apt:
        - r-base-core
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.R <<'RS'
          writeLines("ok", "same-folder.txt")
          cat(readLines("same-folder.txt"), sep = "\n")
          RS
          Rscript --vanilla Main.R | grep '^ok$'
          cat > Broken.R <<'RS'
          if (
          RS
          if Rscript --vanilla -e "parse(file=commandArgs(TRUE)[1])" Broken.R >/dev/null 2>&1; then exit 1; fi

  erlang:
    install:
      apt:
        - erlang-base
        - erlang-dev
        - erlang-parsetools
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > main.erl <<'ERL'
          -module(main).
          -export([main/0]).
          main() ->
              ok = file:write_file("same-folder.txt", <<"ok">>),
              {ok, Data} = file:read_file("same-folder.txt"),
              io:format("~s~n", [Data]).
          ERL
          erlc main.erl
          erl +S 1:1 +A 1 -noshell -pa . -s main main -s init stop | grep '^ok$'
          cat > Broken.erl <<'ERL'
          -module(broken).
          -export([main/0]).
          main() ->
              ok =
          ERL
          if erlc Broken.erl >/dev/null 2>&1; then exit 1; fi

  prolog:
    install:
      apt:
        - swi-prolog-nox
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.pl <<'PROLOG'
          main :-
              setup_call_cleanup(
                  open('same-folder.txt', write, Out),
                  write(Out, ok),
                  close(Out)
              ),
              setup_call_cleanup(
                  open('same-folder.txt', read, In),
                  read_string(In, _, Content),
                  close(In)
              ),
              writeln(Content).
          PROLOG
          swipl -q -f Main.pl -g main -t halt | grep '^ok$'
          cat > Broken.pl <<'PROLOG'
          main :-
              writeln(ok
          PROLOG
          if swipl -q -f Broken.pl -g main -t halt >/dev/null 2>&1; then exit 1; fi

  whitespace:
    install:
      apt:
        - python3
    smoke:
      command:
        - bash
        - -lc
        - |
          python3 - <<'PY' > Main.ws
          S = " "
          T = "\t"
          L = "\n"
          def number(value):
              sign = S if value >= 0 else T
              bits = bin(abs(value))[2:]
              payload = ''.join(S if ch == '0' else T for ch in bits)
              return sign + payload + L
          def push(value):
              return S + S + number(value)
          def out_char():
              return T + L + S + S
          program = ''.join(push(ord(ch)) + out_char() for ch in "ok\n") + L + L + L
          print(program, end="")
          PY
          python3 /usr/local/lib/aonohako/whitespace.py Main.ws | grep '^ok$'

  bf:
    install:
      apt:
        - python3
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s' '++++++++++[>+++++++>++++++++++>+++>+<<<<-]>++.>+.+++++++..+++.>++.<<+++++++++++++++.>.+++.------.--------.>+.>.' > Main.bf
          python3 /usr/local/lib/aonohako/brainfuck.py Main.bf | grep '^Hello World!$'

  wasm:
    install:
      apt:
        - curl
        - wabt
        - xz-utils
      script:
        - curl -fsSL https://wasmtime.dev/install.sh | bash
        - ln -sfn /root/.wasmtime/bin/wasmtime /usr/local/bin/wasmtime
        - test -x /usr/local/bin/wasmtime
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.wat <<'WAT'
          (module
            (import "wasi_snapshot_preview1" "fd_write"
              (func $fd_write (param i32 i32 i32 i32) (result i32)))
            (memory 1)
            (export "memory" (memory 0))
            (data (i32.const 8) "ok\n")
            (func (export "_start")
              i32.const 0
              i32.const 8
              i32.store
              i32.const 4
              i32.const 3
              i32.store
              i32.const 1
              i32.const 0
              i32.const 1
              i32.const 20
              call $fd_write
              drop))
          WAT
          wat2wasm Main.wat -o Main.wasm
          wasmtime run --dir=. Main.wasm | grep '^ok$'

  ocaml:
    install:
      apt:
        - ocaml-nox
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'print_endline "ok"' > Main.ml
          ocamlopt -o Main Main.ml
          env OCAMLRUNPARAM='s=32k' ./Main | grep '^ok$'

  go:
    install:
      apt:
        - gcc
      script:
        - ln -sfn /usr/local/go/bin/go /usr/local/bin/go
        - ln -sfn /usr/local/go/bin/gofmt /usr/local/bin/gofmt
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'package main' 'import "fmt"' 'func main() { fmt.Println("ok") }' > main.go
          env -u GOROOT GOENV=off go build -o Main main.go
          ./Main | grep '^ok$'

  zig:
    install:
      apt:
        - curl
        - xz-utils
      script:
        - export ZIG_VERSION=0.14.0
        - curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
        - mkdir -p /opt
        - tar -xJf /tmp/zig.tar.xz -C /opt
        - ln -sfn "/opt/zig-linux-x86_64-${ZIG_VERSION}/zig" /usr/local/bin/zig
        - rm -f /tmp/zig.tar.xz
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.zig <<'ZIG'
          const std = @import("std");
          pub fn main() !void {
              try std.fs.cwd().writeFile(.{ .sub_path = "same-folder.txt", .data = "ok" });
              const data = try std.fs.cwd().readFileAlloc(std.heap.page_allocator, "same-folder.txt", 16);
              defer std.heap.page_allocator.free(data);
              try std.io.getStdOut().writer().print("{s}\n", .{data});
          }
          ZIG
          zig build-exe Main.zig -O ReleaseSafe -femit-bin=Main
          ./Main | grep '^ok$'
          cat > Broken.zig <<'ZIG'
          pub fn main() void {
              this is invalid
          }
          ZIG
          if zig build-exe Broken.zig -O ReleaseSafe -femit-bin=Broken >/dev/null 2>&1; then exit 1; fi

  fortran:
    install:
      apt:
        - gfortran
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.f90 <<'F90'
          program main
            implicit none
            character(len=32) :: line
            open(unit=10, file='same-folder.txt', status='replace', action='write')
            write(10, '(A)') 'ok'
            close(10)
            open(unit=11, file='same-folder.txt', status='old', action='read')
            read(11, '(A)') line
            close(11)
            print '(A)', trim(line)
          end program main
          F90
          gfortran -O2 -pipe Main.f90 -o Main
          ./Main | grep '^ok$'
          cat > Broken.f90 <<'F90'
          program broken
            integer :: x
            x =
          end program broken
          F90
          if gfortran -O2 -pipe Broken.f90 -o Broken >/dev/null 2>&1; then exit 1; fi

  d:
    install:
      apt:
        - gcc
        - libc6-dev
        - ldc
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.d <<'D'
          import std.file : write, readText;
          import std.stdio : writeln;
          void main() {
              write("same-folder.txt", "ok");
              writeln(readText("same-folder.txt"));
          }
          D
          ldc2 Main.d -O3 -release -of=Main
          ./Main | grep '^ok$'
          cat > Broken.d <<'D'
          void main() {
              this is invalid;
          }
          D
          if ldc2 Broken.d -O3 -release -of=Broken >/dev/null 2>&1; then exit 1; fi

  coq:
    install:
      apt:
        - coq
    smoke:
      command:
        - bash
        - -lc
        - |
          cat > Main.v <<'COQ'
          Theorem same_folder_ok : 1 = 1.
          Proof. reflexivity. Qed.
          COQ
          coqc -q Main.v
          [ -f Main.vo ]
          cat > Broken.v <<'COQ'
          Theorem broken : 1 = 2.
          Proof. reflexivity. Qed.
          COQ
          if coqc -q Broken.v >/dev/null 2>&1; then exit 1; fi

  rust:
    install:
      apt:
        - curl
        - gcc
        - g++
      script:
        - export RUSTUP_HOME=/usr/local/rustup
        - export CARGO_HOME=/usr/local/cargo
        - export PATH=/usr/local/cargo/bin:$PATH
        - mkdir -p "$RUSTUP_HOME" "$CARGO_HOME"
        - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable --no-modify-path
        - ln -sfn /usr/local/cargo/bin/rustc /usr/local/bin/rustc
        - ln -sfn /usr/local/cargo/bin/cargo /usr/local/bin/cargo
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' 'fn main() {' '    println!("ok");' '}' > main.rs
          rustc --edition 2024 -O -o Main main.rs
          ./Main | grep '^ok$'

  kotlin:
    install:
      apt:
        - curl
        - openjdk-17-jre-headless
        - xz-utils
      script:
        - export KONAN_VERSION=1.8.10
        - curl -fsSL "https://github.com/JetBrains/kotlin/releases/download/v${KONAN_VERSION}/kotlin-native-linux-x86_64-${KONAN_VERSION}.tar.gz" -o /tmp/kotlin-native.tar.gz
        - mkdir -p /opt
        - tar -xzf /tmp/kotlin-native.tar.gz -C /opt
        - ln -sfn "/opt/kotlin-native-linux-x86_64-${KONAN_VERSION}/bin/kotlinc-native" /usr/local/bin/kotlinc-native
        - ln -sfn "/opt/kotlin-native-linux-x86_64-${KONAN_VERSION}/bin/run_konan" /usr/local/bin/run_konan
        - rm -f /tmp/kotlin-native.tar.gz
    smoke:
      command:
        - bash
        - -lc
        - |
          mkdir -p /tmp/.konan /tmp/.konan.home
          printf '%s\n' 'fun main() {' '  println("ok")' '}' > Main.kt
          env KONAN_DATA_DIR=/tmp/.konan KONAN_USER_HOME=/tmp/.konan.home kotlinc-native Main.kt -o Main
          ./Main.kexe | grep '^ok$'

  csharp:
    install:
      apt:
        - curl
        - libicu72
      script:
        - mkdir -p /opt/dotnet
        - curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
        - bash /tmp/dotnet-install.sh --channel 8.0 --install-dir /opt/dotnet
        - ln -sfn /opt/dotnet/dotnet /usr/local/bin/dotnet
        - rm -f /tmp/dotnet-install.sh
    smoke:
      command:
        - bash
        - -lc
        - |
          mkdir -p /tmp/csharp-home /tmp/csharp-packages
          env HOME=/tmp/csharp-home DOTNET_CLI_HOME=/tmp/csharp-home NUGET_PACKAGES=/tmp/csharp-packages DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_CLI_TELEMETRY_OPTOUT=1 DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE=1 DOTNET_GENERATE_ASPNET_CERTIFICATE=false DOTNET_NOLOGO=1 MSBuildEnableWorkloadResolver=false dotnet new console --force --no-restore --verbosity quiet -n App -o app
          printf '%s\n' 'Console.WriteLine("ok");' > app/Program.cs
          env HOME=/tmp/csharp-home DOTNET_CLI_HOME=/tmp/csharp-home NUGET_PACKAGES=/tmp/csharp-packages DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_CLI_TELEMETRY_OPTOUT=1 DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE=1 DOTNET_GENERATE_ASPNET_CERTIFICATE=false DOTNET_NOLOGO=1 MSBuildEnableWorkloadResolver=false dotnet publish app --configuration Release -o publish
          dotnet ./publish/App.dll | grep '^ok$'

  fsharp:
    install:
      apt:
        - curl
        - libicu72
      script:
        - mkdir -p /opt/dotnet
        - curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
        - bash /tmp/dotnet-install.sh --channel 8.0 --install-dir /opt/dotnet
        - ln -sfn /opt/dotnet/dotnet /usr/local/bin/dotnet
        - rm -f /tmp/dotnet-install.sh
    smoke:
      command:
        - bash
        - -lc
        - |
          mkdir -p /tmp/fsharp-home /tmp/fsharp-packages
          cat > App.fsproj <<'FSPROJ'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include="Program.fs" />
            </ItemGroup>
          </Project>
          FSPROJ
          cat > Program.fs <<'FS'
          open System.IO
          [<EntryPoint>]
          let main _ =
              File.WriteAllText("same-folder.txt", "ok")
              printfn "%s" (File.ReadAllText("same-folder.txt"))
              0
          FS
          env HOME=/tmp/fsharp-home DOTNET_CLI_HOME=/tmp/fsharp-home NUGET_PACKAGES=/tmp/fsharp-packages DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 DOTNET_CLI_TELEMETRY_OPTOUT=1 DOTNET_CLI_WORKLOAD_UPDATE_NOTIFY_DISABLE=1 DOTNET_GENERATE_ASPNET_CERTIFICATE=false DOTNET_NOLOGO=1 MSBuildEnableWorkloadResolver=false dotnet publish App.fsproj --configuration Release -o publish -p:UseAppHost=false
          dotnet ./publish/App.dll | grep '^ok$'

  uhmlang:
    install:
      apt:
        - git
      script:
        - ln -sfn /usr/local/go/bin/go /usr/local/bin/go
        - ln -sfn /usr/local/go/bin/gofmt /usr/local/bin/gofmt
        - git clone --depth=1 https://github.com/rycont/umjunsik-lang.git /tmp/umjunsik-lang
        - cd /tmp/umjunsik-lang/umjunsik-lang-go && env -u GOROOT GOENV=off go build -o /usr/local/bin/umjunsik-lang-go .
        - ln -sfn /usr/local/bin/umjunsik-lang-go /usr/bin/umjunsik-lang-go
        - rm -rf /tmp/umjunsik-lang
    smoke:
      command:
        - bash
        - -lc
        - |
          printf '%s\n' '어떻게' '식........... ........ㅋ' '이 사람이름이냐ㅋㅋ' > Main.uhm
          /usr/bin/umjunsik-lang-go Main.uhm | grep '^X$'

profiles:
  type-a:
    base_image: debian:bookworm-slim
    languages:
      - bf
      - elixir
      - erlang
      - haskell
      - lisp
      - lua
      - ocaml
      - perl
      - php
      - plain
      - prolog
      - pypy
      - python
      - r
      - ruby
      - sqlite
      - wasm
      - whitespace
  type-b:
    base_image: debian:bookworm-slim
    languages:
      - groovy
      - java
      - javascript
      - scala
      - typescript
  type-c:
    base_image: debian:bookworm-slim
    languages:
      - d
      - fortran
      - go
      - rust
      - zig
  type-d:
    base_image: debian:bookworm-slim
    languages:
      - kotlin
  type-e:
    base_image: debian:bookworm-slim
    languages:
      - csharp
      - fsharp
  type-f:
    base_image: debian:bookworm-slim
    languages:
      - uhmlang
  type-g:
    base_image: julia:1.11.5-bookworm
    languages:
      - julia
  type-h:
    base_image: swift:6.2.1-bookworm
    languages:
